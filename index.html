<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mystic Lotus - Blooming Animation</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Montserrat:wght@200;400&family=Alex+Brush&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" type="text/javascript" defer></script>
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="not-loaded">
    <!-- Music toggle button in top-right -->
    <div id="musicToggle" class="music-toggle">
        <span class="music-icon">🔊</span>
    </div>

    <!-- Dark night backdrop with glowing radial aura -->
    <div class="night-sky">
        <div class="night-glow"></div>
        <div class="star-field" id="starField"></div>
    </div>

    <!-- Active container for the scene -->
    <div class="scene">
        <!-- Floating title header -->
        <header class="header">
            <h1 class="title">The Mystic Bloom</h1>
            <div class="signature-credit">by Yasir Arafat</div>
        </header>

        <!-- The Blooming Lotus Assembly -->
        <div class="lotus-container">
            <!-- Single full-piece Lotus image -->
            <div class="lotus-image-wrapper">
                <img src="lotus_full.webp" alt="Mystic Lotus" class="lotus-img">
                <div class="flower-core-glow"></div>
            </div>
            
            <!-- Magical light column rising from the flower -->
            <div class="light-beam"></div>
        </div>

        <!-- Foreground & Background Swaying Grass Blades -->
        <div class="grass-field">
            <div class="grass grass--1"></div>
            <div class="grass grass--2"></div>
            <div class="grass grass--3"></div>
            <div class="grass grass--4"></div>
            <div class="grass grass--5"></div>
            <div class="grass grass--6"></div>
            <div class="grass grass--7"></div>
            <div class="grass grass--8"></div>
        </div>
    </div>
</body>
</html>
